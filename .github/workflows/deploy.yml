name: Deploy Website

on:
  push:
    branches:
      - main

permissions:
  contents: write   # 🔥 REQUIRED FIX

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4   # ✅ updated

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4   # ✅ updated
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
